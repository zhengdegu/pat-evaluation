[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:elasticsearch]
command=/usr/share/elasticsearch/bin/elasticsearch
user=elasticsearch
environment=ES_JAVA_OPTS="-Xms512m -Xmx512m",JAVA_HOME="/usr/lib/jvm/java-11-openjdk-amd64"
autostart=true
autorestart=true
stdout_logfile=/var/log/elasticsearch.log
stderr_logfile=/var/log/elasticsearch-err.log
priority=10

[program:redis]
command=redis-server --requirepass salt668 --dir /data/redis
autostart=true
autorestart=true
stdout_logfile=/var/log/redis.log
stderr_logfile=/var/log/redis-err.log
priority=20

[program:es-init]
command=/bin/bash /app/init-es.sh
autostart=true
autorestart=false
startsecs=0
startretries=1
stdout_logfile=/var/log/es-init.log
stderr_logfile=/var/log/es-init-err.log
priority=30

[program:backend]
command=gunicorn -b 127.0.0.1:5001 -w 4 --timeout 120 main:app
directory=/app/backend
environment=ESURL="http://127.0.0.1:9200",REDIS_HOST="127.0.0.1",REDIS_PORT="6379",REDIS_PASSWORD="salt668"
autostart=true
autorestart=true
stdout_logfile=/var/log/backend.log
stderr_logfile=/var/log/backend-err.log
priority=40

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx.log
stderr_logfile=/var/log/nginx-err.log
priority=50
